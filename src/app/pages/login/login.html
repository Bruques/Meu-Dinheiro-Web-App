<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <h2>💸 MeuDinheiro</h2>
      <p>{{ isLoginMode ? 'Bem-vindo de volta!' : 'Crie sua conta gratuitamente' }}</p>
    </div>

    <div class="error-box" *ngIf="erroMensagem">
      {{ erroMensagem }}
    </div>

    <form (ngSubmit)="submeter()" class="login-form">
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="seu@email.com" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" name="senha" [(ngModel)]="senha" placeholder="******" required>
      </div>

      <button type="submit" class="btn-primary">
        {{ isLoginMode ? 'Entrar' : 'Cadastrar' }}
      </button>
    </form>

    <div class="toggle-mode">
      <button type="button" class="btn-link" (click)="alternarModo()">
        {{ isLoginMode ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Faça Login' }}
      </button>
    </div>
  </div>
</div>
