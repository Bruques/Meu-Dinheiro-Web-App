<div class="main-layout">
  <header class="app-header">
    <h1>MeuDinheiroApp 💸</h1>
  </header>
  
  <app-dashboard></app-dashboard>
</div>

<button class="fab-button" (click)="abrirModal()">
  <span class="fab-icon">+</span>
</button>

<div class="modal-overlay" *ngIf="isModalOpen" (click)="fecharModal()">
  
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Novo Gasto com IA 🪄</h3>
      <button class="close-btn" (click)="fecharModal()">✕</button>
    </div>
    
    <app-expense-input></app-expense-input>
  </div>
</div>
