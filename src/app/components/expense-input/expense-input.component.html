<div class="container">
  <h2>Registre seu Gasto com IA 🤖</h2>
  <p>Fale ou digite como você faria normalmente.</p>

  <div class="entrada-ia-container">

    <textarea [formControl]="expenseControl" placeholder="Ex: comprei 50 reais de pão na padaria hoje no pix"
      (keyup.enter)="onSubmit()" [disabled]="isLoading || isRecording" rows="3"></textarea>

    <div class="botoes-acao">

      <button type="button" (click)="iniciarGravacao()" [class.gravando]="isRecording" [disabled]="isLoading"
        class="btn-microfone">
        <span *ngIf="!isRecording">🎙️ Falar Gasto</span>
        <span *ngIf="isRecording">🔴 Ouvindo... (fale agora)</span>
      </button>

      <button type="button" (click)="onSubmit()" [disabled]="isLoading || isRecording || !expenseControl.value"
        class="btn-enviar">
        <span *ngIf="!isLoading">Enviar Texto</span>
        <span *ngIf="isLoading">⏳ Processando...</span>
      </button>

    </div>
  </div>

  <div *ngIf="savedExpenses && savedExpenses.length > 0" class="resultados-lote">
  <h3>✅ {{ savedExpenses.length }} Gasto(s) Registrado(s)!</h3>
  
  <div class="result-card" *ngFor="let exp of savedExpenses">
    <p><strong>Item:</strong> {{ exp.name }}</p>
    <p><strong>Valor:</strong> R$ {{ exp.value }}</p>
    <p><strong>Categoria:</strong> <span class="badge">{{ exp.category }}</span></p>
  </div>
</div>
</div>
